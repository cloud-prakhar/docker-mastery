# 3-tier stack: Nginx → Flask → MongoDB
#
# Network design:
#   frontend-net  Nginx ↔ Flask  (internet-accessible)
#   backend-net   Flask ↔ Mongo  (internal only, no outbound internet)

services:

  # ── Reverse Proxy ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - frontend-net
    restart: unless-stopped

  # ── Application ────────────────────────────────────────────────────────────
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    environment:
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/${MONGO_DB}?authSource=admin
      FLASK_ENV: ${FLASK_ENV:-production}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - frontend-net
      - backend-net
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Database ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    volumes:
      - mongodata:/data/db
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  mongodata:

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
    internal: true    # Flask → Mongo traffic never leaves the host
