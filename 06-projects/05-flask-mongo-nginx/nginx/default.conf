upstream flask_app {
    # Docker DNS resolves "app" to the Flask container's IP
    server app:5000;
}

server {
    listen 80;
    server_name localhost;

    # ── Static files served directly by Nginx ──────────────────────────────
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── API requests proxied to Flask ──────────────────────────────────────
    location /api/ {
        proxy_pass         http://flask_app;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout  5s;
        proxy_read_timeout     30s;

        # Basic rate limiting (10 requests/sec per IP, burst of 20)
        # limit_req zone=api burst=20 nodelay;
    }

    # ── Health endpoint (used by Docker healthcheck) ───────────────────────
    location /health {
        proxy_pass http://flask_app/api/health;
    }

    # Hide Nginx version from error pages
    server_tokens off;
}
